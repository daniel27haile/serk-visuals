<!-- layouts/admin-layouts/admin-layouts.component.html -->
<div class="admin-layout" [class.drawer-open]="sideOpen" [attr.data-admin-theme]="themeService.activeThemeId()">

  <!-- Off-canvas sidebar -->
  <aside
    class="sidebar"
    [class.sidebar--open]="sideOpen"
    role="navigation"
    aria-label="Admin navigation"
    id="sidebar"
  >
    <!-- Sidebar brand -->
    <div class="sidebar__brand">
      <div class="sidebar__brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <div class="sidebar__brand-text">
        <span class="sidebar__brand-name">Serk Visuals</span>
        <span class="sidebar__brand-role">Admin Panel</span>
      </div>
    </div>

    <nav class="sidebar__nav">

      <a
        [routerLink]="['/admin/dashboard']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        aria-label="Dashboard"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
      </a>

      <a
        [routerLink]="['/admin/bookings']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: false }"
        aria-label="Bookings"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Bookings
      </a>

      <a
        [routerLink]="['/admin/contact']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: false }"
        aria-label="Messages"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Messages
      </a>

      <a
        [routerLink]="['/admin/gallery']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: false }"
        aria-label="Gallery"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        Gallery
      </a>

      <a
        [routerLink]="['/admin/testimonials']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: false }"
        aria-label="Testimonials"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/>
          <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/>
        </svg>
        Testimonials
      </a>

      <a
        [routerLink]="['/admin/pricing']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: false }"
        aria-label="Pricing"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        Pricing
      </a>

      <a
        [routerLink]="['/admin/projects']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: false }"
        aria-label="Projects"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        Projects
      </a>

      <div class="sidebar__divider" aria-hidden="true"></div>

      <a
        [routerLink]="['/admin/settings']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: false }"
        aria-label="Settings"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Settings
      </a>

    </nav>

    <!-- Sidebar footer: quick link to public site -->
    <div class="sidebar__footer">
      <a href="/" target="_blank" rel="noopener" class="sidebar__view-site">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        View Public Site
      </a>
    </div>
  </aside>

  <!-- Backdrop for mobile -->
  <button
    class="backdrop"
    *ngIf="sideOpen"
    (click)="sideOpen = false"
    aria-label="Close menu"
  ></button>

  <section class="admin-content">
    <header class="topbar">
      <button
        class="menu-btn"
        (click)="sideOpen = !sideOpen"
        aria-label="Toggle menu"
        [attr.aria-expanded]="sideOpen"
        aria-controls="sidebar"
      >
        <span class="bar"></span>
      </button>

      <div class="topbar__spacer"></div>

      <div class="topbar__right">
        <div class="topbar__user">
          <div class="topbar__avatar" aria-hidden="true">A</div>
          <span class="topbar__username">Admin</span>
        </div>
        <button class="logout-btn" (click)="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </button>
      </div>
    </header>

    <main class="main-area">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
