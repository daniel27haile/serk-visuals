<!-- layouts/admin-layouts/admin-layouts.component.html -->
<div class="admin-layout" [class.drawer-open]="sideOpen">
  <!-- Off-canvas sidebar -->
  <aside
    class="sidebar"
    [class.sidebar--open]="sideOpen"
    role="navigation"
    aria-label="Admin navigation"
    id="sidebar"
  >
    <h2 class="logo">Admin Panel</h2>

    <nav class="sidebar__nav">
      <a
        [routerLink]="['/admin/dashboard']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >Dashboard</a>

      <a
        [routerLink]="['/admin/bookings']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: false }"
      >Bookings</a>

      <a
        [routerLink]="['/admin/contact']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: false }"
      >User Contacts</a>

      <a
        [routerLink]="['/admin/projects']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: false }"
      >Projects</a>

      <a
        [routerLink]="['/admin/settings']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: false }"
      >Settings</a>

      <a
        [routerLink]="['/admin/gallery']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: false }"
      >Gallery</a>

      <a
        [routerLink]="['/admin/testimonials']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: false }"
      >Testimonials</a>
    </nav>
  </aside>

  <!-- Backdrop for mobile -->
  <button
    class="backdrop"
    *ngIf="sideOpen"
    (click)="sideOpen = false"
    aria-label="Close menu"
  ></button>

  <section class="admin-content">
    <header class="topbar">
      <button
        class="menu-btn"
        (click)="sideOpen = !sideOpen"
        aria-label="Toggle menu"
        [attr.aria-expanded]="sideOpen"
        aria-controls="sidebar"
      >
        <span class="bar"></span>
      </button>

      <p class="welcome">Welcome, Admin</p>

      <button class="logout-btn" (click)="logout()">Logout</button>
    </header>

    <main class="main-area">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
