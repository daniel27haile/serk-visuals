name: PR Preview

# Deploys a Vercel preview for every PR and comments the URL directly on the PR.
# Lets you review UI changes without merging first.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# One preview deployment per PR at a time — cancel the previous build when
# a new commit is pushed to the same PR.
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Needs write access to post the comment on the PR.
permissions:
  pull-requests: write

jobs:
  preview:
    name: Vercel Preview Deployment
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: serk-visuals-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: serk-visuals-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build preview
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha  = context.payload.pull_request.head.sha.slice(0, 7);

            // Find any existing bot comment for this PR so we update it
            // instead of posting a new one on every push.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- vercel-preview -->')
            );

            const body = [
              '<!-- vercel-preview -->',
              '### Vercel Preview',
              `| | |`,
              `|---|---|`,
              `| **URL** | [${url}](${url}) |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Status** | ✅ Ready |`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
