name: Deploy

# Runs ONLY on push to main (after a PR is merged).
# Re-runs the same CI checks, then deploys both frontend and backend in parallel.

on:
  push:
    branches: [main]

# Only one deploy at a time — never cancel a deploy in progress.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Re-run CI checks before any deployment ─────────────────────────────────
  frontend-ci:
    name: Frontend — Type-check, Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: serk-visuals-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: serk-visuals-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Build (production)
        run: npm run build:prod

      - name: Unit tests (headless Chrome)
        run: npx ng test --watch=false --browsers=ChromeHeadless --no-progress

      # Keep the production build artifact so deploy-frontend can reuse it
      # instead of building a second time.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: serk-visuals-ui/dist/serk-visuals-ui/browser/
          retention-days: 1

  backend-ci:
    name: Backend — Install & Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: serk-visuals-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: serk-visuals-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check all JS files
        run: find . -name "*.js" -not -path "./node_modules/*" | xargs node --check

  # ── Deploy frontend to Vercel ───────────────────────────────────────────────
  deploy-frontend:
    name: Deploy → Vercel (Production)
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    defaults:
      run:
        working-directory: serk-visuals-ui
    environment:
      name: production
      url: https://serkvisuals.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: serk-visuals-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build via Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Print deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"

  # ── Deploy backend to Render ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy → Render (Production)
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    environment:
      name: production

    steps:
      - name: Trigger Render deploy hook
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render API responded with status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
            echo "Deploy hook failed with status $STATUS"
            exit 1
          fi
          echo "Render deployment triggered successfully."
