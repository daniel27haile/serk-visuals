name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  frontend-ci:
    name: Frontend — Type-check, Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: serk-visuals-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: serk-visuals-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Build (production)
        run: npm run build:prod

      - name: Unit tests (headless Chrome)
        run: npx ng test --watch=false --browsers=ChromeHeadless --no-progress

  backend-ci:
    name: Backend — Install & Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: serk-visuals-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: serk-visuals-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check all JS files
        run: find . -name "*.js" -not -path "./node_modules/*" | xargs node --check

  deploy-frontend:
    name: Deploy → Vercel (Production)
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    # No job-level working-directory default.
    # Vercel CLI steps each set working-directory: serk-visuals-ui explicitly.
    # The dashboard Root Directory MUST be empty/cleared (see notes below).
    environment:
      name: production
      url: https://serkvisuals.com
    env:
      VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      # Fail early with a clear message rather than deep inside a deploy command
      - name: Validate Vercel secrets
        run: |
          missing=()
          [ -z "$VERCEL_TOKEN" ]      && missing+=("VERCEL_TOKEN")
          [ -z "$VERCEL_ORG_ID" ]     && missing+=("VERCEL_ORG_ID")
          [ -z "$VERCEL_PROJECT_ID" ] && missing+=("VERCEL_PROJECT_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "::error::Add them in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "All Vercel secrets present."

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Debug — verify repo structure before deploy
        run: |
          echo "--- pwd (repo root) ---"
          pwd
          echo "--- repo root contents ---"
          ls -la
          echo "--- serk-visuals-ui contents ---"
          ls -la serk-visuals-ui

      # Vercel CLI runs from serk-visuals-ui/ on each step below.
      # vercel.json in that folder supplies buildCommand, outputDirectory, rewrites, and headers.
      # We skip "vercel build" (local build simulation) because it fails in GitHub Actions
      # with "spawn sh ENOENT" — the spawned Node child process can't locate sh on PATH.
      # "vercel deploy --prod" (source deploy) lets Vercel build on their own servers
      # where sh is always available.
      - name: Pull Vercel project settings
        working-directory: serk-visuals-ui
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        working-directory: serk-visuals-ui
        run: |
          URL=$(vercel deploy --prod --token="$VERCEL_TOKEN")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Print deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"

  deploy-backend:
    name: Deploy → Render (Production)
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    environment:
      name: production

    steps:
      - name: Trigger Render deploy hook
        run: |
          HOOK_URL="${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          if [ -z "$HOOK_URL" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set. Add it in Settings → Secrets."
            exit 1
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HOOK_URL")
          echo "Render API responded with status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
            echo "Deploy hook failed with status $STATUS"
            exit 1
          fi
          echo "Render deployment triggered successfully."
