# Serk Visuals — Nginx server config
# Deploy: sudo cp /var/www/serkvisuals/serk-visuals/nginx.conf \
#               /etc/nginx/sites-available/serkvisuals.com
#         sudo ln -sf /etc/nginx/sites-available/serkvisuals.com \
#               /etc/nginx/sites-enabled/serkvisuals.com
#         sudo nginx -t && sudo systemctl reload nginx
#
# After first deploy, run Certbot:
#   sudo certbot --nginx -d serkvisuals.com -d www.serkvisuals.com
# Certbot will add SSL directives and manage the redirect block automatically.

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name serkvisuals.com www.serkvisuals.com;

    # Certbot will add its ACME challenge location here automatically.
    # After certbot runs, it replaces this block or adds a redirect.
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name serkvisuals.com www.serkvisuals.com;

    # SSL — filled in by Certbot; do NOT edit these paths manually
    # ssl_certificate     /etc/letsencrypt/live/serkvisuals.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/serkvisuals.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Angular static root ──────────────────────────────────────────────
    # Angular 18 application builder outputs to dist/<project>/browser/
    # (NOT dist/<project>/ directly — that directory only contains browser/).
    root  /var/www/serkvisuals/serk-visuals/serk-visuals-ui/dist/serk-visuals-ui/browser;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Hashed static assets (JS/CSS bundles, fonts, images) ─────────────
    # Angular production build appends content hashes to filenames,
    # so these can be cached forever.
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── index.html — never cache so deploys take effect immediately ───────
    # NOTE: Nginx add_header inheritance — any location with its own add_header
    # directives does NOT inherit the server-block headers. All security headers
    # must be explicitly repeated here.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";

        # Security headers (repeated because this block has its own add_header)
        add_header X-Frame-Options        "SAMEORIGIN"                         always;
        add_header X-Content-Type-Options "nosniff"                            always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"    always;

        # Content-Security-Policy for the Angular SPA document.
        # img-src must include S3 and CloudFront origins for gallery images.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://serkvisuals-prod.s3.amazonaws.com https://*.amazonaws.com https://*.cloudfront.net; connect-src 'self' https://serkvisuals.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self';" always;

        try_files $uri =404;
    }

    # ── API proxy → Node/Express (PM2, port 5000) ────────────────────────
    # IMPORTANT: no trailing slash on proxy_pass — preserves the /api/ prefix
    # so the backend receives the full path (e.g. /api/gallery, /api/auth/...).
    location /api/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;

        # Required for WebSocket upgrade (not currently used, but safe to keep)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Forwarding headers — must match app.set("trust proxy", 1) in app.js
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Increase timeouts for large file uploads (S3 presign + client upload)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    # ── Angular SPA fallback ──────────────────────────────────────────────
    # All non-file, non-API routes return index.html so Angular router handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────
    # These apply to location blocks that do NOT define their own add_header
    # (i.e. location /api/ and location /). Blocks with their own add_header
    # (static assets, index.html) must repeat needed headers explicitly.
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Content-Security-Policy — inherited by location / (SPA fallback).
    # img-src allows S3 and CloudFront for gallery images.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://serkvisuals-prod.s3.amazonaws.com https://*.amazonaws.com https://*.cloudfront.net; connect-src 'self' https://serkvisuals.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self';" always;
}
