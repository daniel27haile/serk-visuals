<header class="site-header">
  <div class="container header__row">
    <!-- Brand -->
    <a [routerLink]="['/home']" class="logo" aria-label="Serk Visuals — Home">
      <span class="logo__img-wrap">
        <picture>
          <source srcset="images/serkvisuals_logo.webp" type="image/webp" />
          <img
            class="logo__img"
            src="images/serkvisuals_logo.png"
            alt="Serk Visuals logo"
            width="612"
            height="408"
            loading="eager"
          />
        </picture>
      </span>
    </a>

    <!-- Mobile toggle -->
    <button
      type="button"
      class="menu-toggle"
      [attr.aria-expanded]="isMenuOpen"
      aria-controls="site-nav"
      (click)="toggleMenu()"
    >
      <span class="sr-only">Toggle menu</span>
      <span class="burger" [class.open]="isMenuOpen">
        <span></span><span></span><span></span>
      </span>
    </button>

    <!-- Navigation -->
    <nav id="site-nav" class="nav" [class.is-open]="isMenuOpen" role="navigation" aria-label="Primary">
      <a [routerLink]="['/home']" routerLinkActive="is-active" (click)="closeMenu()">Home</a>
      <a [routerLink]="['/real-estate']" routerLinkActive="is-active" (click)="closeMenu()">Real Estate</a>
      <a [routerLink]="['/gallery']" routerLinkActive="is-active" (click)="closeMenu()">Portfolio</a>
      <a [routerLink]="['/services']" routerLinkActive="is-active" (click)="closeMenu()">Services</a>
      <a [routerLink]="['/about-us']" routerLinkActive="is-active" (click)="closeMenu()">About</a>
      <a [routerLink]="['/contact']" routerLinkActive="is-active" (click)="closeMenu()">Contact</a>

      <a class="btn btn--accent nav__cta" [routerLink]="['/bookings']" (click)="closeMenu()" aria-label="Book a session">
        Book Now
      </a>
    </nav>
  </div>
</header>
