name: Deploy → DigitalOcean

on:
  push:
    branches: [main]

# Only one production deploy at a time; never cancel an in-progress deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Frontend CI ──────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Type-check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: serk-visuals-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: serk-visuals-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Build (production)
        run: npm run build:prod

  # ── Backend CI ───────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend — Install & Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: serk-visuals-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: serk-visuals-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check all JS files
        run: find . -name "*.js" -not -path "./node_modules/*" | xargs node --check

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → DigitalOcean
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    environment:
      name: production
      url: https://serkvisuals.com

    steps:
      - name: SSH into droplet & deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port:     ${{ secrets.PORT }}
          key:      ${{ secrets.SSH_KEY }}
          # Each line in `script` is a separate SSH command.
          # `set -e` makes the entire script abort on the first error,
          # so a failed build will not reload Nginx with broken files.
          script: |
            set -e

            cd /var/www/serkvisuals/serk-visuals

            echo "→ Pulling latest code..."
            git pull origin main

            # ── Backend ──────────────────────────────────────────────────────
            echo "→ Installing backend dependencies..."
            cd serk-visuals-backend
            npm ci --omit=dev

            echo "→ Reloading API with PM2..."
            pm2 reload ecosystem.config.js --env production \
              || pm2 start ecosystem.config.js --env production
            pm2 save

            # ── Frontend ─────────────────────────────────────────────────────
            echo "→ Installing frontend dependencies..."
            cd ../serk-visuals-ui
            npm ci

            echo "→ Building Angular frontend..."
            npm run build:prod

            # ── Nginx ────────────────────────────────────────────────────────
            echo "→ Testing Nginx config..."
            sudo nginx -t

            echo "→ Reloading Nginx..."
            sudo systemctl reload nginx

            echo "✅ Deployment complete — https://serkvisuals.com"
