<section class="login">
  <h1>Admin Login</h1>
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="field-wrap">
      <label>Email
        <input type="email" formControlName="email" autocomplete="username"
          [class.is-invalid]="form.controls['email'].touched && form.controls['email'].invalid" />
      </label>
      <div class="field-errors" *ngIf="form.controls['email'].touched && form.controls['email'].invalid">
        <small *ngIf="form.controls['email'].errors?.['required']">Email is required.</small>
        <small *ngIf="form.controls['email'].errors?.['email']">Enter a valid email address.</small>
      </div>
    </div>

    <div class="field-wrap">
      <label>Password
        <input type="password" formControlName="password" autocomplete="current-password"
          [class.is-invalid]="form.controls['password'].touched && form.controls['password'].invalid" />
      </label>
      <div class="field-errors" *ngIf="form.controls['password'].touched && form.controls['password'].invalid">
        <small *ngIf="form.controls['password'].errors?.['required']">Password is required.</small>
      </div>
    </div>

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Signing in…' : 'Login' }}
    </button>
    <p *ngIf="error()" class="error">{{ error() }}</p>
  </form>
</section>
