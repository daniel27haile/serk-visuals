<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Serk Visuals | Professional Photography & Videography</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ── Primary SEO ─────────────────────────────────────── -->
  <meta name="description" content="Serk Visuals — professional photography and videography for weddings, events, portraits, and brands. Book your session today.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0b0a10">

  <!-- ── Open Graph (Facebook / LinkedIn) ───────────────── -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="Serk Visuals">
  <meta property="og:title"       content="Serk Visuals | Professional Photography & Videography">
  <meta property="og:description" content="Capturing life's most important moments. Wedding, event, portrait, and brand photography & videography.">
  <meta property="og:image"       content="/images/serkvisuals_logo.png">

  <!-- ── Twitter Card ───────────────────────────────────── -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Serk Visuals | Professional Photography & Videography">
  <meta name="twitter:description" content="Capturing life's most important moments. Wedding, event, portrait, and brand photography & videography.">
  <meta name="twitter:image"       content="/images/serkvisuals_logo.png">

  <!-- ── Favicon — Serk Visuals logo ────────────────────── -->
  <link rel="icon" type="image/png" sizes="32x32" href="/images/sv.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/sv.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/images/serkvisuals_logo.png">
  <link rel="shortcut icon" href="favicon.ico"><!-- legacy ICO fallback -->

  <!-- ── DNS/connection hints for production API ─────────── -->
  <link rel="dns-prefetch" href="https://serk-visuals-api.onrender.com">
  <link rel="preconnect" href="https://serk-visuals-api.onrender.com" crossorigin>

  <!-- ── Fonts — async load to eliminate render-blocking ─── -->
  <!-- TCP+TLS to Google Fonts is established early via preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!--
    rel=preload fetches the CSS without blocking the parser.
    onload swaps it to a real stylesheet once downloaded.
    Reduced to the weights actually needed (9 → 7 variants).
  -->
  <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;1,400&family=Josefin+Sans:wght@400;600;700&display=swap"
        onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;1,400&family=Josefin+Sans:wght@400;600;700&display=swap">
  </noscript>
</head>
<body>
  <app-root></app-root>
</body>
</html>
